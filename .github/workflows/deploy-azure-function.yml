# =============================================================
# GitHub Actions — 自动部署到 Azure Functions (Consumption Plan)
#
# 触发条件: push to master (仅交易相关代码变更时)
# 部署流程: checkout → build → curl zipdeploy (Oryx remote build)
#
# ── 前提 ──
#
# 1. GitHub Secret (Settings → Secrets and variables → Actions → Secrets):
#
#    AZURE_FUNCTIONAPP_PUBLISH_PROFILE
#      Azure Portal → cfd-py-forex → Overview → Download publish profile
#      将下载的 XML 文件全部内容复制为此 secret
#
# 2. Azure Portal → cfd-py-forex → Settings → Environment variables:
#
#    ── 必需 (系统级) ──
#      AzureWebJobsStorage              <storagerichdad 的 Connection string>
#      FUNCTIONS_WORKER_RUNTIME         python
#      SCM_DO_BUILD_DURING_DEPLOYMENT   true
#      ENABLE_ORYX_BUILD                true
#
#    ── 必需 (业务级) ──
#      ACTIVE_PROFILE              oanda_demo
#      CFD_DRY_RUN                 true
#      CFD_OANDA_API_KEY           <Oanda API Key>
#      CFD_OANDA_DEMO_OANDA_ACCOUNT_ID  <Oanda Account ID>
#      CFD_TELEGRAM_BOT_TOKEN      <Telegram Bot Token>
#      CFD_TELEGRAM_CHAT_ID        <Telegram Chat ID>
#      AZURE_STORAGE_CONNECTION    <可选，留空用本地存储>
#
#    ── 删除以下旧设置 (如果存在) ──
#      WEBSITE_RUN_FROM_PACKAGE    ← 删除
#
# =============================================================

name: Deploy to Azure Functions

on:
  push:
    branches: [master]
    paths:
      - 'core/**'
      - 'data/**'
      - 'execution/**'
      - 'storage/**'
      - 'config/**'
      - 'notification/**'
      - 'live/**'
      - '.github/workflows/deploy-azure-function.yml'
  workflow_dispatch:  # 手动触发

env:
  AZURE_FUNCTIONAPP_NAME: cfd-py-forex
  PYTHON_VERSION: '3.12'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 3. Build deployment package (source only, no pip install) ──
      - name: Build deployment package
        run: |
          bash live/azure_function/deploy.sh build
          echo "=== Deployment package contents ==="
          find .azure_deploy -type f | head -50
          echo "=== Package size ==="
          du -sh .azure_deploy

      # ── 4. Create zip ──
      - name: Create deployment zip
        run: |
          cd .azure_deploy
          zip -qr ../deploy.zip .
          cd ..
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"

      # ── 5. Deploy via Kudu REST API (bypass functions-action) ──
      #
      # azure/functions-action@v1 对 Linux Consumption Plan 有已知 400 Bug，
      # 改用 curl 直接调用 Kudu zipdeploy API，更可靠且能看到完整错误。
      # Oryx 远程构建由 Portal 环境变量 SCM_DO_BUILD_DURING_DEPLOYMENT=true 控制。
      #
      - name: Deploy to Azure Functions
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          set -e

          # Parse SCM credentials from publish profile XML
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          SCM_URL="https://${AZURE_FUNCTIONAPP_NAME}.scm.azurewebsites.net"

          if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "::error::Failed to parse credentials from publish profile"
            exit 1
          fi
          echo "SCM user: $USERNAME"

          # Health check — verify SCM site is reachable
          echo "=== SCM health check ==="
          HC_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SCM_URL/api/settings" \
            -u "$USERNAME:$PASSWORD" \
            --max-time 30)
          echo "SCM health: HTTP $HC_CODE"
          if [ "$HC_CODE" -ge 400 ]; then
            echo "::error::SCM site not reachable (HTTP $HC_CODE). Check publish profile."
            exit 1
          fi

          # Deploy via zipdeploy (async for remote build)
          echo "=== Deploying via zipdeploy ==="
          HTTP_CODE=$(curl -s -o deploy_response.txt -w "%{http_code}" \
            -X POST "$SCM_URL/api/zipdeploy?isAsync=true" \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @deploy.zip \
            --max-time 300)

          echo "Deploy response: HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Deployment failed (HTTP $HTTP_CODE)"
            echo "Response body:"
            cat deploy_response.txt
            exit 1
          fi

          # For async deploy, poll status
          if [ "$HTTP_CODE" = "202" ]; then
            POLL_URL=$(grep -i "^location:" deploy_response.txt | tr -d '\r' | awk '{print $2}' || true)
            if [ -z "$POLL_URL" ]; then
              POLL_URL="$SCM_URL/api/deployments/latest"
            fi
            echo "Async deploy started. Polling status..."
            for i in $(seq 1 30); do
              sleep 10
              STATUS=$(curl -s "$POLL_URL" -u "$USERNAME:$PASSWORD")
              DEPLOY_STATUS=$(echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',d.get('provisioningState','unknown')))" 2>/dev/null || echo "unknown")
              echo "  [$i/30] Status: $DEPLOY_STATUS"
              if [ "$DEPLOY_STATUS" = "4" ] || [ "$DEPLOY_STATUS" = "Succeeded" ]; then
                echo "Deployment succeeded!"
                exit 0
              elif [ "$DEPLOY_STATUS" = "3" ] || [ "$DEPLOY_STATUS" = "Failed" ]; then
                echo "::error::Remote build failed"
                echo "$STATUS" | python3 -m json.tool 2>/dev/null || echo "$STATUS"
                exit 1
              fi
            done
            echo "::warning::Deployment still in progress after 5 minutes (may succeed later)"
          else
            echo "Deployment completed (HTTP $HTTP_CODE)"
          fi

