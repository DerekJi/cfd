# =============================================================
# GitHub Actions — 自动部署到 Azure Functions (Consumption Plan)
#
# 触发条件: push to master (仅交易相关代码变更时)
# 部署流程: checkout → build → curl zipdeploy (Oryx remote build)
#
# ── 前提 ──
#
# 1. GitHub Secret (Settings → Secrets and variables → Actions → Secrets):
#
#    AZURE_FUNCTIONAPP_PUBLISH_PROFILE
#      Azure Portal → cfd-py-forex → Overview → Download publish profile
#      将下载的 XML 文件全部内容复制为此 secret
#
# 2. Azure Portal → cfd-py-forex → Settings → Environment variables:
#
#    ── 必需 (系统级) ──
#      AzureWebJobsStorage              <storagerichdad 的 Connection string>
#      FUNCTIONS_WORKER_RUNTIME         python
#      SCM_DO_BUILD_DURING_DEPLOYMENT   true
#      ENABLE_ORYX_BUILD                true
#
#    ── 必需 (业务级) ──
#      ACTIVE_PROFILE              oanda_demo
#      CFD_DRY_RUN                 true
#      CFD_OANDA_API_KEY           <Oanda API Key>
#      CFD_OANDA_DEMO_OANDA_ACCOUNT_ID  <Oanda Account ID>
#      CFD_TELEGRAM_BOT_TOKEN      <Telegram Bot Token>
#      CFD_TELEGRAM_CHAT_ID        <Telegram Chat ID>
#      AZURE_STORAGE_CONNECTION    <可选，留空用本地存储>
#
#    ── 删除以下旧设置 (如果存在) ──
#      WEBSITE_RUN_FROM_PACKAGE    ← 删除
#
# =============================================================

name: Deploy to Azure Functions

on:
  push:
    branches: [master]
    paths:
      - 'core/**'
      - 'data/**'
      - 'execution/**'
      - 'storage/**'
      - 'config/**'
      - 'notification/**'
      - 'live/**'
      - '.github/workflows/deploy-azure-function.yml'
  workflow_dispatch:  # 手动触发

env:
  AZURE_FUNCTIONAPP_NAME: cfd-py-forex
  PYTHON_VERSION: '3.12'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 3. Build deployment package (source only, no pip install) ──
      - name: Build deployment package
        run: |
          bash live/azure_function/deploy.sh build
          echo "=== Deployment package contents ==="
          find .azure_deploy -type f | head -50
          echo "=== Package size ==="
          du -sh .azure_deploy

      # ── 4. Create zip ──
      - name: Create deployment zip
        run: |
          cd .azure_deploy
          zip -qr ../deploy.zip .
          cd ..
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"

      # ── 5. Deploy via Kudu REST API (pure Python urllib) ──
      - name: Deploy to Azure Functions
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import urllib.request, urllib.error
          import base64, os, sys, time, json, socket

          # ── 1. Parse publish profile ──
          pp = os.environ["PUBLISH_PROFILE"]
          root = ET.fromstring(pp)

          # Prefer ZipDeploy profile, fallback to MSDeploy
          profile = root.find(".//publishProfile[@publishMethod='ZipDeploy']")
          if profile is None:
              profile = root.find(".//publishProfile[@publishMethod='MSDeploy']")
          if profile is None:
              profile = root.findall(".//publishProfile")[0]

          user = profile.attrib["userName"]
          pwd  = profile.attrib["userPWD"]

          # Use publishUrl from XML directly (don't construct it ourselves)
          pub_url = profile.attrib.get("publishUrl", "")
          if pub_url:
              # Remove port suffix if present (e.g. ":443")
              host = pub_url.split(":")[0] if ":" in pub_url and not pub_url.startswith("http") else pub_url
              if host.startswith("http"):
                  scm = host
              else:
                  scm = f"https://{host}"
          else:
              app = os.environ["AZURE_FUNCTIONAPP_NAME"]
              scm = f"https://{app}.scm.azurewebsites.net"

          cred = base64.b64encode(f"{user}:{pwd}".encode()).decode()
          auth = f"Basic {cred}"

          print(f"Profile method: {profile.attrib.get('publishMethod')}")
          print(f"publishUrl (raw): {pub_url}")
          print(f"SCM URL:  {scm}")
          print(f"SCM user: {user}")
          print(f"Auth header length: {len(auth)}")

          # ── DNS check ──
          hostname = scm.replace("https://", "").replace("http://", "").split("/")[0]
          print(f"\nDNS lookup: {hostname}")
          try:
              ip = socket.getaddrinfo(hostname, 443)[0][4][0]
              print(f"  Resolved to: {ip}")
          except Exception as e:
              print(f"  DNS FAILED: {e}")
              print("  This means the Azure Function App SCM site doesn't exist or is not accessible.")
              print("  Please verify the app exists in Azure Portal.")
              sys.exit(1)

          # ── 2. Health check ──
          print("\n=== SCM health check ===")
          try:
              req = urllib.request.Request(f"{scm}/api/settings",
                                           headers={"Authorization": auth})
              resp = urllib.request.urlopen(req, timeout=60)
              print(f"SCM health: HTTP {resp.status} OK")
          except urllib.error.HTTPError as e:
              print(f"SCM health: HTTP {e.code}")
              print(f"Response: {e.read().decode()[:500]}")
              sys.exit(1)
          except Exception as e:
              print(f"SCM health check failed: {e}")
              sys.exit(1)

          # ── 3. ZIP deploy (async for Oryx remote build) ──
          print("\n=== Deploying via zipdeploy ===")
          with open("deploy.zip", "rb") as f:
              zip_data = f.read()
          print(f"Zip size: {len(zip_data)} bytes ({len(zip_data)/1024/1024:.1f} MB)")

          try:
              req = urllib.request.Request(
                  f"{scm}/api/zipdeploy?isAsync=true",
                  data=zip_data,
                  method="POST",
                  headers={
                      "Authorization": auth,
                      "Content-Type": "application/octet-stream",
                  })
              resp = urllib.request.urlopen(req, timeout=300)
              status_code = resp.status
              location = resp.headers.get("Location", "")
              body = resp.read().decode()
              print(f"Deploy response: HTTP {status_code}")
          except urllib.error.HTTPError as e:
              print(f"::error::Deploy failed: HTTP {e.code}")
              print(f"Response: {e.read().decode()[:2000]}")
              sys.exit(1)
          except Exception as e:
              print(f"::error::Deploy request failed: {e}")
              sys.exit(1)

          # ── 4. Poll async build status ──
          if status_code == 202:
              poll_url = location if location else f"{scm}/api/deployments/latest"
              print(f"Async deploy started. Polling: {poll_url}")
              for i in range(1, 36):
                  time.sleep(10)
                  try:
                      req2 = urllib.request.Request(poll_url,
                                                     headers={"Authorization": auth})
                      resp2 = urllib.request.urlopen(req2, timeout=30)
                      d = json.loads(resp2.read().decode())
                      st = d.get("status", "unknown")
                  except Exception as ex:
                      st = f"poll-error: {ex}"
                  print(f"  [{i}/35] Status: {st}")
                  if st == 4:
                      print("Deployment succeeded!")
                      sys.exit(0)
                  elif st == 3:
                      print("::error::Remote build failed")
                      try: print(json.dumps(d, indent=2))
                      except: pass
                      sys.exit(1)
              print("::warning::Deploy still in progress after ~6 min (may succeed later)")
          else:
              print(f"Deployment completed (HTTP {status_code})")
          PYEOF

