# =============================================================
# GitHub Actions — 自动部署到 Azure Functions (Consumption Plan)
#
# 触发条件: push to master (仅交易相关代码变更时)
# 部署流程: checkout → build → curl zipdeploy (Oryx remote build)
#
# ── 前提 ──
#
# 1. GitHub Secret (Settings → Secrets and variables → Actions → Secrets):
#
#    AZURE_FUNCTIONAPP_PUBLISH_PROFILE
#      Azure Portal → cfd-py-forex → Overview → Download publish profile
#      将下载的 XML 文件全部内容复制为此 secret
#
# 2. Azure Portal → cfd-py-forex → Settings → Environment variables:
#
#    ── 必需 (系统级) ──
#      AzureWebJobsStorage              <storagerichdad 的 Connection string>
#      FUNCTIONS_WORKER_RUNTIME         python
#      SCM_DO_BUILD_DURING_DEPLOYMENT   true
#      ENABLE_ORYX_BUILD                true
#
#    ── 必需 (业务级) ──
#      ACTIVE_PROFILE              oanda_demo
#      CFD_DRY_RUN                 true
#      CFD_OANDA_API_KEY           <Oanda API Key>
#      CFD_OANDA_DEMO_OANDA_ACCOUNT_ID  <Oanda Account ID>
#      CFD_TELEGRAM_BOT_TOKEN      <Telegram Bot Token>
#      CFD_TELEGRAM_CHAT_ID        <Telegram Chat ID>
#      AZURE_STORAGE_CONNECTION    <可选，留空用本地存储>
#
#    ── 删除以下旧设置 (如果存在) ──
#      WEBSITE_RUN_FROM_PACKAGE    ← 删除
#
# =============================================================

name: Deploy to Azure Functions

on:
  push:
    branches: [master]
    paths:
      - 'core/**'
      - 'data/**'
      - 'execution/**'
      - 'storage/**'
      - 'config/**'
      - 'notification/**'
      - 'live/**'
      - '.github/workflows/deploy-azure-function.yml'
  workflow_dispatch:  # 手动触发

env:
  AZURE_FUNCTIONAPP_NAME: cfd-py-forex
  PYTHON_VERSION: '3.12'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 3. Build deployment package (source only, no pip install) ──
      - name: Build deployment package
        run: |
          bash live/azure_function/deploy.sh build
          echo "=== Deployment package contents ==="
          find .azure_deploy -type f | head -50
          echo "=== Package size ==="
          du -sh .azure_deploy

      # ── 4. Create zip ──
      - name: Create deployment zip
        run: |
          cd .azure_deploy
          zip -qr ../deploy.zip .
          cd ..
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"

      # ── 5. Deploy via Kudu REST API (bypass functions-action) ──
      #
      # azure/functions-action@v1 对 Linux Consumption Plan 有已知 400 Bug，
      # 改用 curl 直接调用 Kudu zipdeploy API，更可靠且能看到完整错误。
      # Oryx 远程构建由 Portal 环境变量 SCM_DO_BUILD_DURING_DEPLOYMENT=true 控制。
      #
      # Parse publish profile & deploy via python3 (avoids bash XML/special char issues)
      - name: Deploy to Azure Functions
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import subprocess, os, sys, time, json

          # ── 1. Parse publish profile XML ──
          pp = os.environ["PUBLISH_PROFILE"]
          root = ET.fromstring(pp)
          profile = root.find(".//publishProfile[@publishMethod='MSDeploy']")
          if profile is None:
              profile = root.findall(".//publishProfile")[0]


          user = profile.attrib["userName"]
          pwd  = profile.attrib["userPWD"]
          scm  = f"https://{os.environ['AZURE_FUNCTIONAPP_NAME']}.scm.azurewebsites.net"

          print(f"SCM user: {user}")
          print(f"SCM URL:  {scm}")
          print(f"Password length: {len(pwd)}")

          # ── 2. Health check ──
          print("\n=== SCM health check ===")
          r = subprocess.run(
              ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}",
               f"{scm}/api/settings", "-u", f"{user}:{pwd}", "--max-time", "30"],
              capture_output=True, text=True
          )
          hc = r.stdout.strip()
          print(f"SCM health: HTTP {hc}")
          if r.returncode != 0:
              print(f"curl error: exit {r.returncode}, stderr: {r.stderr}")
              sys.exit(1)
          if int(hc) >= 400:
              print(f"::error::SCM not reachable (HTTP {hc})")
              sys.exit(1)

          # ── 3. ZIP deploy (async for Oryx remote build) ──
          print("\n=== Deploying via zipdeploy ===")
          r = subprocess.run(
              ["curl", "-s", "-o", "deploy_resp.txt", "-w", "%{http_code}",
               "-D", "deploy_headers.txt",
               "-X", "POST", f"{scm}/api/zipdeploy?isAsync=true",
               "-u", f"{user}:{pwd}",
               "-H", "Content-Type: application/octet-stream",
               "--data-binary", "@deploy.zip",
               "--max-time", "300"],
              capture_output=True, text=True
          )
          code = r.stdout.strip()
          print(f"Deploy response: HTTP {code}")
          if r.returncode != 0:
              print(f"curl error: exit {r.returncode}, stderr: {r.stderr}")
              sys.exit(1)

          if int(code) >= 400:
              print("::error::Deployment failed")
              with open("deploy_resp.txt") as f:
                  print(f.read())
              sys.exit(1)

          # ── 4. Poll async status ──
          if code == "202":
              # Try to get Location header
              poll_url = f"{scm}/api/deployments/latest"
              try:
                  with open("deploy_headers.txt") as f:
                      for line in f:
                          if line.lower().startswith("location:"):
                              poll_url = line.split(":", 1)[1].strip()
                              break
              except: pass

              print(f"Async deploy started. Polling: {poll_url}")
              for i in range(1, 31):
                  time.sleep(10)
                  r2 = subprocess.run(
                      ["curl", "-s", poll_url, "-u", f"{user}:{pwd}"],
                      capture_output=True, text=True
                  )
                  try:
                      d = json.loads(r2.stdout)
                      st = d.get("status", "unknown")
                  except:
                      st = "unknown"
                  print(f"  [{i}/30] Status: {st}")
                  if st == 4:
                      print("Deployment succeeded!")
                      sys.exit(0)
                  elif st == 3:
                      print("::error::Remote build failed")
                      print(json.dumps(d, indent=2))
                      sys.exit(1)
              print("::warning::Deploy still in progress after 5 min (may succeed later)")
          else:
              print(f"Deployment completed (HTTP {code})")
          PYEOF

